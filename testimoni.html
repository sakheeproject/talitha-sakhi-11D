<h1> Ruang Baca</h1>
<main class="formulir">
    <h2>Berikan Testimoni anda</h2>
    <form id="formTestimoni">
        <label for="nama">Identitas Sang Pengelana:</label>
        <input type="text" id="nama" name="nama" required placeholder="Nama Lengkap">

        <label for="asal">Asal Sekolah/Instansi/komunitas:</label>
        <input type="text" id="asal" name="asal" required placeholder="asal">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="email@example.com">

        <label for="judul">judul :</label>
        <input type="text" id="judul" name="judul" required placeholder="nge-date sama buku apa?">

        <label for="pesan">Untaian kata:</label>
        <textarea id="pesan" name="pesan" required placeholder="Bagikan jejak pemikiranmu di sini..." rows="5"></textarea>

        <label for="rating">Nilai buku yang kamu baca:</label>
        <input type="number" id="rating" name="rating" min="1" max="5" placeholder="Nilai dari Sang Pengelana">
        <button type="submit">Kirim Testimoni</button>
    </form>

</main>
<footer>
    <p>&copy; 2026 Ruang Baca</p>

</footer>
 <script>
    document.getElementById('formTestimoni').addEventListener('submit',function(e) {
        e.preventDefault();

        const nama= document.getElementById('nama').value;
        const asal= document.getElementById('asal').value;
        const email= document.getElementById('email').value;
        const judul= document.getElementById('judul').value;
        const pesan= document.getElementById('pesan').value;
        const rating= document.getElementById('rating').value;

        const dataBaru={nama, asal, email, judul, pesan, rating};
        //ambil dari localstorage
        const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

        //tambahin testimoni baru
        testimoniList.push(dataBaru);

        //simpan lgi ke localStorage
        localStorage.setItem('testimoniList',JSON.stringify(testimoniList));

        //arain ke hlmn konfirmasi
        window.location.href='proses-testimoni.html';

    })
 </script>
